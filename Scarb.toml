[package]
name = "chainhope"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = "2.16.0"
openzeppelin = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", branch = "main" }

[dev-dependencies]
snforge_std = "0.57.0"
assert_macros = "2.16.0"

[[target.starknet-contract]]
sierra = true

[scripts]
test = "snforge test"

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[tool.snforge]
exit_first = true